name: WatchDog Cloud Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: watchdog-cloud-monitor-state
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-color-emoji

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Save monitor state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/state.json data/html/ data/screenshots/ || true

          if git diff --cached --quiet; then
            echo "No monitor state changes to commit."
          else
            git commit -m "Update WatchDog Cloud monitor state"

            for attempt in 1 2 3; do
              git pull --rebase origin "$GITHUB_REF_NAME"
              if git push origin "HEAD:$GITHUB_REF_NAME"; then
                echo "Push succeeded."
                exit 0
              fi
              echo "Push failed. Retry $attempt/3 after 5 seconds."
              sleep 5
            done

            echo "Push failed after retries."
            exit 1
          fi
